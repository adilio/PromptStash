name: Supabase keep-alive

# Free-tier Supabase projects pause after ~7 days without API activity, which
# takes down auth and data for the live app (this happened in production —
# the project was found INACTIVE). A twice-weekly ping keeps it awake.

on:
  schedule:
    - cron: '17 6 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf --max-time 30 \
            "https://ecpmipfpknoxeohbafxs.supabase.co/rest/v1/teams?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
